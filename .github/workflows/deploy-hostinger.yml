name: Deploy PrimeOS to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hostinger-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for primeos.primeodontologia.com.br
        run: npm run build:primeos

      - name: Create auth and SPA rules
        run: |
          cat > dist/.htaccess << 'EOF'
          AuthType Basic
          AuthName "Authorization required"
          AuthUserFile /home/u188684587/domains/primeodontologia.com.br/public_html/primeos/.htpasswd
          Require user admin

          RewriteEngine On
          RewriteBase /
          RewriteRule ^index\.html$ - [L]
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule . /index.html [L]
          EOF

          cp .htpasswd dist/.htpasswd

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER || '89.117.7.117' }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          port: ${{ secrets.HOSTINGER_FTP_PORT || '21' }}
          protocol: ftp
          local-dir: dist/
          server-dir: ${{ secrets.HOSTINGER_REMOTE_DIR || '/primeos/' }}
          dangerous-clean-slate: true